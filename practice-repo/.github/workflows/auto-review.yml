name: Auto Review PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate PR
        id: validate
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_AUTHOR=${{ github.event.pull_request.user.login }}
          
          echo "Reviewing PR #${PR_NUMBER} by ${PR_AUTHOR}"
          
          # Check 1: PR only modifies files in students/ directory
          CHANGED_FILES=$(gh pr diff $PR_NUMBER --name-only)
          INVALID_FILES=$(echo "$CHANGED_FILES" | grep -v "^students/" || true)
          
          if [ -n "$INVALID_FILES" ]; then
            echo "❌ PR modifies files outside students/ directory"
            echo "invalid_files=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check 2: PR adds exactly one JSON file
          ADDED_JSON=$(echo "$CHANGED_FILES" | grep "\.json$" | wc -l)
          if [ "$ADDED_JSON" -lt 1 ]; then
            echo "❌ PR must add at least one .json file in students/"
            echo "no_json=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check 3: JSON is valid
          for f in $(echo "$CHANGED_FILES" | grep "\.json$"); do
            if [ -f "$f" ]; then
              python3 -c "import json; json.load(open('$f'))" 2>/dev/null
              if [ $? -ne 0 ]; then
                echo "❌ Invalid JSON in $f"
                echo "invalid_json=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          done
          
          # Check 4: PR has a title
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [ ${#PR_TITLE} -lt 5 ]; then
            echo "❌ PR title too short"
            echo "short_title=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ All checks passed!"
          echo "approved=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: steps.validate.outputs.approved != 'true'
        run: |
          MESSAGE="👋 感谢提交 PR！但有一些问题需要修复：\n\n"
          
          if [ "${{ steps.validate.outputs.invalid_files }}" = "true" ]; then
            MESSAGE="${MESSAGE}- ❌ 只能修改 \`students/\` 目录下的文件\n"
          fi
          if [ "${{ steps.validate.outputs.no_json }}" = "true" ]; then
            MESSAGE="${MESSAGE}- ❌ 需要在 \`students/\` 下添加至少一个 \`.json\` 文件\n"
          fi
          if [ "${{ steps.validate.outputs.invalid_json }}" = "true" ]; then
            MESSAGE="${MESSAGE}- ❌ JSON 文件格式不正确\n"
          fi
          if [ "${{ steps.validate.outputs.short_title }}" = "true" ]; then
            MESSAGE="${MESSAGE}- ❌ PR 标题太短（至少 5 个字符）\n"
          fi
          
          MESSAGE="${MESSAGE}\n修复后重新 push，PR 会自动重新审核。加油！💪"
          
          gh pr comment ${{ github.event.pull_request.number }} --body "$MESSAGE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve and merge
        if: steps.validate.outputs.approved == 'true'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # Approve
          gh pr review $PR_NUMBER --approve --body "🎉 自动审核通过！恭喜你完成了 PRSchool 毕业挑战！"
          
          # Merge
          gh pr merge $PR_NUMBER --squash --auto
          
          # Notify backend
          if [ -n "$PRSCHOOL_WEBHOOK_URL" ]; then
            curl -X POST "$PRSCHOOL_WEBHOOK_URL/api/github/pr-merged" \
              -H "Content-Type: application/json" \
              -H "x-webhook-secret: $PRSCHOOL_WEBHOOK_SECRET" \
              -d "{\"prNumber\": $PR_NUMBER, \"repoOwner\": \"prschool\", \"repoName\": \"playground\", \"action\": \"merged\"}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRSCHOOL_WEBHOOK_URL: ${{ secrets.PRSCHOOL_WEBHOOK_URL }}
          PRSCHOOL_WEBHOOK_SECRET: ${{ secrets.PRSCHOOL_WEBHOOK_SECRET }}
